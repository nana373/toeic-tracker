<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC勉強コミュニティ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore,collection,doc,setDoc,addDoc,getDocs,getDoc,query,where,updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBo2OHmY9wLkRmTIjkNuaZOKpunkSj5cCU",authDomain:"toeic-community-e08b4.firebaseapp.com",projectId:"toeic-community-e08b4",storageBucket:"toeic-community-e08b4.firebasestorage.app",messagingSenderId:"799423705039",appId:"1:799423705039:web:86a1c5d3404fbb7e98ecba"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
let currentUser=null,chartInstance=null;
function hashPW(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0;}return h.toString(16);}
function localDateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getTodayKey(){return localDateStr(new Date());}
function getMonthKey(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;}
function getWeekStartKey(){const d=new Date();const day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return localDateStr(d);}
function daysUntil(s){if(!s)return null;const t=new Date(s+'T00:00:00');const n=new Date();n.setHours(0,0,0,0);return Math.ceil((t-n)/86400000);}
window.addEventListener('DOMContentLoaded',async()=>{
  const sid=localStorage.getItem('toeic_uid');
  if(sid){const snap=await getDoc(doc(db,'users',sid));if(snap.exists()){currentUser={id:sid,...snap.data()};showApp();return;}}
  showAuth('login');
});
function showAuth(mode){document.getElementById('auth-screen').style.display='flex';document.getElementById('app-screen').style.display='none';switchAuthMode(mode);}
window.switchAuthMode=function(mode){document.getElementById('auth-login').style.display=mode==='login'?'block':'none';document.getElementById('auth-register').style.display=mode==='register'?'block':'none';document.getElementById('login-err').style.display='none';document.getElementById('reg-err').style.display='none';};
function showErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';}
window.login=async function(){
  const name=document.getElementById('login-name').value.trim(),pw=document.getElementById('login-pw').value;
  if(!name||!pw){showErr('login-err','名前とパスワードを入力してください');return;}
  const btn=document.getElementById('login-btn');btn.disabled=true;btn.textContent='ログイン中...';
  try{const snap=await getDocs(query(collection(db,'users'),where('name','==',name)));if(snap.empty){showErr('login-err','ユーザーが見つかりません');return;}const ud=snap.docs[0];if(ud.data().pwHash!==hashPW(pw)){showErr('login-err','パスワードが違います');return;}currentUser={id:ud.id,...ud.data()};localStorage.setItem('toeic_uid',ud.id);showApp();}
  catch(e){showErr('login-err','エラー: '+e.message);}finally{btn.disabled=false;btn.textContent='ログイン';}
};
window.register=async function(){
  const name=document.getElementById('reg-name').value.trim(),pw=document.getElementById('reg-pw').value,pw2=document.getElementById('reg-pw2').value,target=parseInt(document.getElementById('reg-target').value);
  if(!name){showErr('reg-err','名前を入力してください');return;}if(pw.length<8){showErr('reg-err','パスワードは8文字以上で入力してください');return;}if(!/^[a-zA-Z0-9]+$/.test(pw)){showErr('reg-err','パスワードは英数字のみ使用できます');return;}if(pw!==pw2){showErr('reg-err','パスワードが一致しません');return;}if(!target||target<10||target>990){showErr('reg-err','目標スコアを正しく入力してください（10〜990）');return;}
  const btn=document.getElementById('reg-btn');btn.disabled=true;btn.textContent='登録中...';
  try{const ex=await getDocs(query(collection(db,'users'),where('name','==',name)));if(!ex.empty){showErr('reg-err','その名前はすでに使われています');return;}const uid='u_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);const today=getTodayKey();const ud={name,pwHash:hashPW(pw),targetScore:target,targetDate:'',currentScore:'',currentScoreDate:'',comment:'',createdAt:today};await setDoc(doc(db,'users',uid),ud);currentUser={id:uid,...ud};localStorage.setItem('toeic_uid',uid);showApp();}
  catch(e){showErr('reg-err','エラー: '+e.message);}finally{btn.disabled=false;btn.textContent='登録する';}
};
function showApp(){document.getElementById('auth-screen').style.display='none';document.getElementById('app-screen').style.display='block';document.getElementById('header-name').textContent=currentUser.name;loadTab('home');}
window.loadTab=function(tab){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));const b=document.querySelector(`[data-tab="${tab}"]`);if(b)b.classList.add('active');document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');document.getElementById(`tab-${tab}`).style.display='block';if(tab==='home')loadHome();if(tab==='members')loadMembers();if(tab==='input')loadInput();if(tab==='mypage')loadMyPage();};
window.goMyPage=()=>loadTab('mypage');
window.logout=function(){if(!confirm('ログアウトしますか？'))return;localStorage.removeItem('toeic_uid');currentUser=null;showAuth('login');};
async function loadHome(){
  const el=document.getElementById('home-content');el.innerHTML='<div class="loading">読み込み中...</div>';
  const ws=getWeekStartKey(),mk=getMonthKey();
  const [us,rs]=await Promise.all([getDocs(collection(db,'users')),getDocs(collection(db,'records'))]);
  const users={};us.forEach(d=>{users[d.id]={id:d.id,...d.data()};});
  const wH={},mH={},lS={},lD={};
  rs.forEach(d=>{const r=d.data();const uid=r.userId;if(!uid)return;if(r.date&&r.date>=ws)wH[uid]=(wH[uid]||0)+(r.studyHours||0);if(r.monthKey&&r.monthKey===mk)mH[uid]=(mH[uid]||0)+(r.studyHours||0);if(r.score&&r.date&&(!lD[uid]||r.date>lD[uid])){lD[uid]=r.date;lS[uid]=r.score;}});
  us.forEach(d=>{const u=d.data();if(u.currentScore&&u.currentScoreDate&&(!lD[d.id]||u.currentScoreDate>=lD[d.id])){lS[d.id]=parseInt(u.currentScore);}});
  const wr=Object.entries(wH).sort((a,b)=>b[1]-a[1]),mr=Object.entries(mH).sort((a,b)=>b[1]-a[1]),sr=Object.entries(lS).sort((a,b)=>b[1]-a[1]);
  el.innerHTML=`<div class="rank-grid"><div class="rank-panel"><div class="section-title">今週の勉強時間</div>${rankH(wr,users)}</div><div class="rank-panel"><div class="section-title">今月の勉強時間</div>${rankH(mr,users)}</div></div><div style="margin-top:1.1rem"><div class="section-title">TOEICスコアランキング</div><div class="score-rank-list">${rankS(sr,users)}</div></div>`;
}
function rankH(ranked,users){if(!ranked.length)return '<div class="empty-s">まだデータがありません</div>';const max=ranked[0][1]||1;return ranked.map(([uid,val],i)=>{const u=users[uid]||{name:'不明'};const isMe=uid===currentUser?.id;const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;return `<div class="rank-item${isMe?' is-me':''}"><div class="rank-medal">${medal}</div><div class="rank-info"><div class="rank-name">${u.name}${isMe?'<span class="me-badge">あなた</span>':''}</div><div class="rank-bar-wrap"><div class="rank-bar" style="width:${(val/max*100).toFixed(0)}%"></div></div></div><div class="rank-val">${val.toFixed(1)}<span class="unit">h</span></div></div>`;}).join('');}
function rankS(ranked,users){if(!ranked.length)return '<div class="empty-s">スコアデータがありません</div>';return ranked.map(([uid,score],i)=>{const u=users[uid]||{name:'不明'};const isMe=uid===currentUser?.id;const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;const diff=u.targetScore?score-u.targetScore:null;return `<div class="rank-item${isMe?' is-me':''}"><div class="rank-medal">${medal}</div><div class="rank-info"><div class="rank-name">${u.name}${isMe?'<span class="me-badge">あなた</span>':''}${diff!==null?`<span class="dbadge ${diff>=0?'pos':'neg'}">${diff>=0?'+':''}${diff}</span>`:''}</div><div class="rank-bar-wrap"><div class="rank-bar score-bar" style="width:${(score/990*100).toFixed(0)}%"></div></div></div><div class="rank-val">${score}<span class="unit">点</span></div></div>`;}).join('');}
async function loadMembers(){
  const el=document.getElementById('members-list');el.innerHTML='<div class="loading">読み込み中...</div>';
  try{const us=await getDocs(collection(db,'users'));const users=[];us.forEach(d=>users.push({id:d.id,...d.data()}));if(!users.length){el.innerHTML='<div class="empty-s">メンバーがいません</div>';return;}
  el.innerHTML=users.map(u=>{const score=u.currentScore?parseInt(u.currentScore):null;const diff=(score&&u.targetScore)?score-u.targetScore:null;const days=daysUntil(u.targetDate);const isMe=u.id===currentUser?.id;return `<div class="mc${isMe?' is-me':''}"><div class="mc-main"><span class="mc-name">${u.name}${isMe?'<span class="me-badge">あなた</span>':''}</span><span class="mc-inline"><span class="mc-lbl">現在</span><span class="mc-val">${score||'—'}</span></span><span class="mc-inline"><span class="mc-lbl">目標</span><span class="mc-val">${u.targetScore||'—'}</span></span><span class="mc-inline"><span class="mc-lbl">期限</span><span class="mc-val">${u.targetDate||'—'}${days!==null?`<span class="dbadge neutral">${days}日</span>`:''}</span></span>${diff!==null?`<span class="dbadge ${diff>=0?'pos':'neg'}">${diff>=0?'+':''}${diff}</span>`:''}</div>${u.comment?`<div class="mc-comment">"${u.comment}"</div>`:''}</div>`;}).join('');}
  catch(e){el.innerHTML=`<div class="empty-s">読み込みエラー: ${e.message}</div>`;}
}
async function loadInput(){
  const tk=getTodayKey(),ws=getWeekStartKey(),mk=getMonthKey();
  document.getElementById('input-today-label').textContent=tk;
  const rs=await getDocs(query(collection(db,'records'),where('userId','==',currentUser.id)));
  let th=0,wt=0,mt=0,tid=null;
  rs.forEach(d=>{const r=d.data();const h=r.studyHours||0;if(r.date===tk){th=h;tid=d.id;}if(r.date&&r.date>=ws)wt+=h;if(r.monthKey&&r.monthKey===mk)mt+=h;});
  document.getElementById('input-hours').value=th||'';document.getElementById('display-week').textContent=wt.toFixed(1);document.getElementById('display-month').textContent=mt.toFixed(1);document.getElementById('input-today-doc').value=tid||'';
  const wb=wt-th,mb=mt-th;
  document.getElementById('input-hours').oninput=function(){const v=parseFloat(this.value)||0;document.getElementById('display-week').textContent=(wb+v).toFixed(1);document.getElementById('display-month').textContent=(mb+v).toFixed(1);};
}
window.submitRecord=async function(){
  const hours=parseFloat(document.getElementById('input-hours').value);if(isNaN(hours)||hours<0||hours>24){alert('勉強時間を正しく入力してください（0〜24時間）');return;}
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='送信中...';
  try{const tk=getTodayKey(),mk=getMonthKey(),ws=getWeekStartKey(),tid=document.getElementById('input-today-doc').value;const data={userId:currentUser.id,userName:currentUser.name,date:tk,monthKey:mk,weekStart:ws,studyHours:hours,updatedAt:new Date().toISOString()};if(tid){await updateDoc(doc(db,'records',tid),data);}else{const ref=await addDoc(collection(db,'records'),data);document.getElementById('input-today-doc').value=ref.id;}document.getElementById('input-success').style.display='block';setTimeout(()=>{document.getElementById('input-success').style.display='none';loadTab('home');},1600);}
  catch(e){alert('送信失敗: '+e.message);}finally{btn.disabled=false;btn.textContent='記録する';}
};
async function loadMyPage(){
  document.getElementById('my-name-disp').textContent=currentUser.name;
  document.getElementById('my-current-score').value=currentUser.currentScore||'';
  document.getElementById('my-current-date').value=currentUser.currentScoreDate||'';
  document.getElementById('my-target-input').value=currentUser.targetScore||'';
  document.getElementById('my-target-date').value=currentUser.targetDate||'';
  document.getElementById('my-comment-input').value=currentUser.comment||'';
  renderMyChart();
}
function renderMyChart(){
  const cs=parseInt(currentUser.currentScore)||null,csD=currentUser.currentScoreDate||null,ts=parseInt(currentUser.targetScore)||null,tsD=currentUser.targetDate||null;
  if(chartInstance){chartInstance.destroy();chartInstance=null;}
  if(!cs||!csD||!ts||!tsD){document.getElementById('my-chart-wrap').style.display='none';document.getElementById('my-stats').innerHTML='<p style="font-size:0.82rem;color:var(--muted);padding:0.25rem 0">プロフィールに現在スコアと目標スコアを入力するとグラフが表示されます。</p>';return;}
  const diff=ts-cs,days=daysUntil(tsD);
  document.getElementById('my-stats').innerHTML=`<div class="stat-card"><div class="stat-val">${cs}</div><div class="stat-label">現在スコア</div></div><div class="stat-card"><div class="stat-val">${ts}</div><div class="stat-label">目標スコア</div></div><div class="stat-card"><div class="stat-val ${diff<=0?'pos':'neg'}">${diff<=0?'達成!':diff+'点'}</div><div class="stat-label">残りスコア</div></div>${days!==null?`<div class="stat-card"><div class="stat-val">${days}</div><div class="stat-label">残り日数</div></div>`:''}`;
  document.getElementById('my-chart-wrap').style.display='block';
  const ctx=document.getElementById('my-chart').getContext('2d');
  const minY=Math.max(0,Math.min(cs,ts)-80),maxY=Math.min(990,Math.max(cs,ts)+80);
  chartInstance=new Chart(ctx,{type:'line',data:{labels:[csD.slice(5),tsD.slice(5)],datasets:[{label:'スコア軌跡',data:[cs,ts],borderColor:'#c8b4f0',backgroundColor:'rgba(200,180,240,0.07)',pointBackgroundColor:['#c8b4f0','#6ee7b7'],pointBorderColor:['#c8b4f0','#6ee7b7'],pointRadius:7,pointHoverRadius:9,tension:0,fill:true}]},options:{responsive:true,plugins:{legend:{labels:{color:'#a0a0b0',font:{family:'Noto Sans JP'}}},tooltip:{callbacks:{label:c=>`${c.parsed.y}点`}}},scales:{x:{ticks:{color:'#8080aa',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},y:{min:minY,max:maxY,ticks:{color:'#8080aa',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}}}}});
}
window.saveProfile=async function(){
  const cs=document.getElementById('my-current-score').value,csd=document.getElementById('my-current-date').value,ts=parseInt(document.getElementById('my-target-input').value)||null,td=document.getElementById('my-target-date').value,comment=document.getElementById('my-comment-input').value.trim();
  if(!ts||ts<10||ts>990){alert('目標スコアを正しく入力してください（10〜990）');return;}if(cs&&(parseInt(cs)<10||parseInt(cs)>990)){alert('現在スコアを正しく入力してください（10〜990）');return;}
  const btn=document.getElementById('save-profile-btn');btn.disabled=true;btn.textContent='保存中...';
  try{const updates={targetScore:ts,targetDate:td,comment,currentScore:cs?parseInt(cs):'',currentScoreDate:csd};await updateDoc(doc(db,'users',currentUser.id),updates);Object.assign(currentUser,updates);document.getElementById('profile-success').style.display='block';setTimeout(()=>document.getElementById('profile-success').style.display='none',2000);renderMyChart();}
  catch(e){alert('保存失敗: '+e.message);}finally{btn.disabled=false;btn.textContent='保存する';}
};
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d14;--bg2:#13131f;--bg3:#1c1c2a;--border:rgba(255,255,255,0.08);--accent:#c8b4f0;--accent2:#8b6fd4;--text:#dcdcec;--muted:#8080aa;--hint:#5a5a7a;--success:#6ee7b7;--danger:#f87171;--fh:'Syne',sans-serif;--fb:'Noto Sans JP',sans-serif;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;line-height:1.6;font-size:15px}
#auth-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:1.5rem;background:radial-gradient(ellipse at 60% 20%,rgba(139,111,212,0.1) 0%,transparent 60%)}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:2.25rem 2rem;width:100%;max-width:390px}
.auth-logo{font-family:var(--fh);font-size:0.85rem;font-weight:800;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1.25rem}
.auth-title{font-family:var(--fh);font-size:1.55rem;font-weight:800;margin-bottom:0.2rem;color:var(--text)}
.auth-sub{color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem}
.auth-switch{text-align:center;margin-top:1rem;font-size:0.83rem;color:var(--muted)}
.auth-switch a{color:var(--accent);cursor:pointer;text-decoration:underline}
.field{margin-bottom:0.85rem}
.field label{display:block;font-size:0.8rem;color:var(--muted);margin-bottom:0.3rem}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:0.65rem 0.9rem;color:var(--text);font-family:var(--fb);font-size:0.95rem;outline:none;transition:border-color 0.2s}
.field input::placeholder{color:var(--hint);font-size:0.88rem}
.field input:focus{border-color:var(--accent2)}
.err-msg{display:none;color:var(--danger);font-size:0.8rem;margin-bottom:0.65rem;padding:0.45rem 0.75rem;background:rgba(248,113,113,0.08);border-radius:6px;border:1px solid rgba(248,113,113,0.18)}
.btn-p{width:100%;background:var(--accent);color:#140830;border:none;border-radius:9px;padding:0.75rem;font-family:var(--fh);font-size:0.92rem;font-weight:700;cursor:pointer;transition:opacity 0.15s,transform 0.1s;margin-top:0.2rem}
.btn-p:hover{opacity:0.9;transform:translateY(-1px)}.btn-p:active{transform:translateY(0)}.btn-p:disabled{opacity:0.45;cursor:not-allowed;transform:none}
#app-screen{display:none;max-width:760px;margin:0 auto;padding-bottom:4rem}
.app-header{padding:0.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.header-logo{font-family:var(--fh);font-size:0.88rem;font-weight:800;color:var(--accent);letter-spacing:0.06em}
.header-right{display:flex;align-items:center;gap:0.6rem}
.header-name{font-size:0.88rem;color:var(--text);cursor:pointer;padding:0.28rem 0.55rem;border-radius:6px;border:1px solid transparent;transition:border-color 0.2s,color 0.2s}
.header-name:hover{border-color:var(--border);color:var(--accent)}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:0.28rem 0.65rem;font-size:0.72rem;cursor:pointer;font-family:var(--fb);transition:all 0.2s}
.logout-btn:hover{border-color:var(--muted);color:var(--text)}
.tab-bar{display:flex;padding:0.5rem 1.25rem;gap:0.3rem;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:47px;z-index:9}
.tab-btn{flex:1;background:none;border:1px solid transparent;border-radius:7px;padding:0.42rem 0.15rem;color:var(--muted);font-family:var(--fb);font-size:0.76rem;cursor:pointer;transition:all 0.18s;text-align:center;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:var(--bg3)}
.tab-btn.active{background:rgba(200,180,240,0.1);border-color:rgba(200,180,240,0.22);color:var(--accent);font-weight:500}
.tab-content{padding:1rem 1.25rem;display:none}
.section-title{font-family:var(--fh);font-size:0.67rem;font-weight:700;color:var(--hint);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.7rem}
.loading,.empty-s{color:var(--muted);font-size:0.88rem;text-align:center;padding:1.75rem 1rem;line-height:1.8}
.success-msg{display:none;text-align:center;padding:0.6rem;background:rgba(110,231,183,0.07);border:1px solid rgba(110,231,183,0.2);border-radius:8px;color:var(--success);font-size:0.85rem;margin-top:0.6rem}
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
@media(max-width:480px){.rank-grid{grid-template-columns:1fr}}
.rank-panel{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:0.8rem}
.rank-item{display:flex;align-items:center;gap:0.6rem;padding:0.45rem 0.3rem;border-bottom:1px solid rgba(255,255,255,0.04)}
.rank-item:last-child{border-bottom:none}
.rank-item.is-me{background:rgba(200,180,240,0.05);border-radius:6px;padding-left:0.45rem}
.rank-medal{width:22px;text-align:center;flex-shrink:0;color:var(--muted);font-family:var(--fh);font-weight:700;font-size:0.8rem}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:0.83rem;font-weight:500;margin-bottom:0.18rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.rank-bar-wrap{background:rgba(255,255,255,0.05);border-radius:2px;height:3px;overflow:hidden}
.rank-bar{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px}
.score-bar{background:linear-gradient(90deg,#38bdf8,#6ee7b7)}
.rank-val{font-family:var(--fh);font-size:0.92rem;font-weight:700;color:var(--accent);flex-shrink:0}
.unit{font-size:0.6rem;color:var(--muted);margin-left:1px}
.score-rank-list{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:0.3rem 0.8rem}
.dbadge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:0.67rem;margin-left:4px;font-weight:500}
.dbadge.pos{background:rgba(110,231,183,0.12);color:var(--success)}
.dbadge.neg{background:rgba(248,113,113,0.12);color:var(--danger)}
.dbadge.neutral{background:rgba(200,180,240,0.12);color:var(--accent)}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:0.55rem 0.9rem;margin-bottom:0.35rem}
.mc.is-me{border-color:rgba(200,180,240,0.28)}
.mc-main{display:flex;align-items:center;flex-wrap:wrap;gap:0.3rem 0.65rem}
.mc-name{font-size:0.9rem;font-weight:500;color:var(--text);flex-shrink:0}
.mc-inline{display:inline-flex;align-items:center;gap:0.22rem;font-size:0.8rem}
.mc-lbl{color:var(--hint);font-size:0.7rem}
.mc-val{color:var(--text);font-weight:500}
.mc-comment{font-size:0.74rem;color:var(--muted);padding:0.28rem 0.5rem;background:var(--bg3);border-radius:5px;margin-top:0.3rem;font-style:italic}
.me-badge{display:inline-block;background:rgba(200,180,240,0.18);color:var(--accent);font-size:0.62rem;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}
.icard{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:1.1rem}
.date-label{font-size:0.75rem;color:var(--muted);margin-bottom:0.9rem}
.irow{margin-bottom:0.75rem}
.irow label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:0.28rem}
.irow input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.85rem;color:var(--text);font-family:var(--fb);font-size:0.93rem;outline:none;transition:border-color 0.2s}
.irow input::placeholder{color:var(--hint);font-size:0.85rem}
.irow input:focus{border-color:var(--accent2)}
.irow input.big{font-family:var(--fh);font-size:1.2rem;font-weight:700}
.irow input.big::placeholder{font-size:0.9rem;font-weight:400;font-family:var(--fb)}
.irow-2{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.75rem}
.irow-2 .irow{margin-bottom:0}
.sum-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin:0.75rem 0}
.sum-card{background:var(--bg3);border-radius:8px;padding:0.6rem 0.8rem}
.sum-label{font-size:0.68rem;color:var(--muted);margin-bottom:0.12rem}
.sum-val{font-family:var(--fh);font-size:1.25rem;font-weight:700;color:var(--accent)}
.my-hd{margin-bottom:0.85rem}
.my-hd h2{font-family:var(--fh);font-size:1.35rem;font-weight:800;color:var(--text)}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:1rem;margin-bottom:0.75rem}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.55rem;margin-bottom:0.75rem}
@media(max-width:480px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:0.7rem 0.85rem}
.stat-val{font-family:var(--fh);font-size:1.2rem;font-weight:800;color:var(--accent)}
.stat-val.pos{color:var(--success)}.stat-val.neg{color:var(--danger)}
.stat-label{font-size:0.68rem;color:var(--muted);margin-top:0.12rem}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:0.9rem;margin-bottom:0.75rem}
.chart-card canvas{max-height:220px}
.pos{color:var(--success)}.neg{color:var(--danger)}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">TOEIC勉強コミュニティ</div>
    <div id="auth-login">
      <div class="auth-title">ログイン</div>
      <div class="auth-sub">登録済みの名前とパスワードで入力してください</div>
      <div class="err-msg" id="login-err"></div>
      <div class="field"><label>名前</label><input type="text" id="login-name" placeholder="登録した名前を入力"></div>
      <div class="field"><label>パスワード</label><input type="password" id="login-pw" placeholder="8文字以上の英数字"></div>
      <button class="btn-p" id="login-btn" onclick="login()">ログイン</button>
      <div class="auth-switch">はじめての方は <a onclick="switchAuthMode('register')">新規登録はこちら</a></div>
    </div>
    <div id="auth-register" style="display:none">
      <div class="auth-title">新規登録</div>
      <div class="auth-sub">架空の名前で参加できます</div>
      <div class="err-msg" id="reg-err"></div>
      <div class="field"><label>名前（他の人と重複不可・最大20文字）</label><input type="text" id="reg-name" placeholder="例：英語マスター志望" maxlength="20"></div>
      <div class="field"><label>パスワード（8文字以上の英数字）</label><input type="password" id="reg-pw" placeholder="例：English8"></div>
      <div class="field"><label>パスワード（確認）</label><input type="password" id="reg-pw2" placeholder="もう一度入力してください"></div>
      <div class="field"><label>TOEIC目標スコア</label><input type="number" id="reg-target" placeholder="例：800（10〜990）" min="10" max="990" step="5"></div>
      <button class="btn-p" id="reg-btn" onclick="register()">登録する</button>
      <div class="auth-switch">登録済みの方は <a onclick="switchAuthMode('login')">ログインはこちら</a></div>
    </div>
  </div>
</div>
<div id="app-screen">
  <header class="app-header">
    <div class="header-logo">TOEIC勉強コミュニティ</div>
    <div class="header-right">
      <span class="header-name" id="header-name" onclick="goMyPage()"></span>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </header>
  <nav class="tab-bar">
    <button class="tab-btn" data-tab="home" onclick="loadTab('home')">ホーム</button>
    <button class="tab-btn" data-tab="members" onclick="loadTab('members')">メンバー</button>
    <button class="tab-btn" data-tab="input" onclick="loadTab('input')">勉強時間入力</button>
    <button class="tab-btn" data-tab="mypage" onclick="loadTab('mypage')">マイページ</button>
  </nav>
  <div class="tab-content" id="tab-home"><div id="home-content"><div class="loading">読み込み中...</div></div></div>
  <div class="tab-content" id="tab-members"><div class="section-title">メンバー一覧</div><div id="members-list"></div></div>
  <div class="tab-content" id="tab-input">
    <div class="section-title">勉強時間の記録</div>
    <div class="icard">
      <div class="date-label">記録日：<span id="input-today-label"></span></div>
      <input type="hidden" id="input-today-doc">
      <div class="irow"><label>本日の勉強時間（時間）</label><input type="number" class="big" id="input-hours" placeholder="例：2.5" min="0" max="24" step="0.5"></div>
      <div class="sum-row">
        <div class="sum-card"><div class="sum-label">今週の合計</div><div class="sum-val"><span id="display-week">0.0</span><span style="font-size:0.76rem;color:var(--muted);margin-left:2px">h</span></div></div>
        <div class="sum-card"><div class="sum-label">今月の合計</div><div class="sum-val"><span id="display-month">0.0</span><span style="font-size:0.76rem;color:var(--muted);margin-left:2px">h</span></div></div>
      </div>
      <button class="btn-p" id="submit-btn" onclick="submitRecord()">記録する</button>
      <div class="success-msg" id="input-success">記録しました！ランキングに反映されます。</div>
    </div>
  </div>
  <div class="tab-content" id="tab-mypage">
    <div class="my-hd"><h2 id="my-name-disp"></h2></div>
    <div class="stats-grid" id="my-stats"></div>
    <div class="chart-card" id="my-chart-wrap" style="display:none"><canvas id="my-chart"></canvas></div>
    <div class="scard">
      <div class="section-title">プロフィール編集</div>
      <div class="irow-2">
        <div class="irow"><label>現在のスコア</label><input type="number" id="my-current-score" placeholder="例：650" min="10" max="990"></div>
        <div class="irow"><label>取得年月日</label><input type="date" id="my-current-date"></div>
      </div>
      <div class="irow-2">
        <div class="irow"><label>目標スコア</label><input type="number" id="my-target-input" placeholder="例：800" min="10" max="990" step="5"></div>
        <div class="irow"><label>目標年月日</label><input type="date" id="my-target-date"></div>
      </div>
      <div class="irow"><label>コメント（一言・意気込みなど）</label><input type="text" id="my-comment-input" placeholder="例：3ヶ月で800点目指す！" maxlength="60"></div>
      <button class="btn-p" id="save-profile-btn" onclick="saveProfile()">保存する</button>
      <div class="success-msg" id="profile-success">保存しました！</div>
    </div>
  </div>
</div>
</body>
</html>
